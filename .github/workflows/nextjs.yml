name: Deploy Next.js site to Pages

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
          
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            
      - name: Install dependencies
        run: npm ci
        
      - name: Build with Next.js
        run: npm run build
        
      - name: Export static files
        run: |
          if [ ! -d "out" ]; then
            echo "Creating out directory and copying static files..."
            mkdir -p out
            cp -r .next/static out/_next/static
            cp -r .next/server/app/* out/
            cp -r public/* out/ 2>/dev/null || true
            # Ensure index.html exists
            if [ -f "out/index.html" ]; then
              echo "Static export successful"
            else
              echo "Error: index.html not found"
              exit 1
            fi
          fi
        
      - name: List build output (debug)
        run: |
          echo "Current directory:"
          pwd
          echo "Directory contents:"
          ls -la
          echo "Looking for out directory:"
          find . -name "out" -type d -not -path "./node_modules/*"
          echo "Looking for .next directory:"
          ls -la .next/ || echo ".next directory not found"
          echo "Contents of out directory (if exists):"
          ls -la out/ || echo "out directory not found"
          echo "Looking for any static export files:"
          find . -name "*.html" -not -path "./node_modules/*" | head -10
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
